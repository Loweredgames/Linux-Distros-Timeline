<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      
  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <title>Linux Distros Timeline</title>
  <link rel="stylesheet" href="timeline.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="intro">
        <h1>Linux Distros Timeline</h1>
        <p>Vertical timeline by year, family nodes, parent-child arrows, zoom/pan and hover tooltips.</p>
        <div class="hint">Drag to pan • Mouse wheel or buttons to zoom • Arrow keys + 0 to reset</div>
      </div>
      <div class="controls">
        <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
        <button id="zoom-out" type="button" aria-label="Zoom out">−</button>
        <button id="reset-view" type="button">Reset</button>
        <button id="fit-view" type="button">Overview View</button>
      </div>
    </header>
    <div id="timeline-wrap">
      <svg id="timeline-svg" viewBox="0 0 1400 1200" preserveAspectRatio="xMinYMin meet"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>
    <i>Last Updated: 24.05.2026 - 16:10</i>
  </div>

  <script src="timeline.js"></script>
</body>
</html>
